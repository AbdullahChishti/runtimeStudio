name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "base_path=/runtimeStudio/$TAG" >> "$GITHUB_OUTPUT"
          echo "site_url=https://abdullahchishti.github.io/runtimeStudio/$TAG" >> "$GITHUB_OUTPUT"

      - name: Build static site (latest)
        if: github.ref == 'refs/heads/main'
        run: npm run build:pages

      - name: Build static site (versioned)
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.version.outputs.base_path }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.version.outputs.site_url }}
          NEXT_PUBLIC_APP_VERSION: ${{ steps.version.outputs.version }}

      - name: Deploy latest to site root
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          keep_files: true

      - name: Deploy version to subfolder
        if: startsWith(github.ref, 'refs/tags/')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          destination_dir: ${{ steps.version.outputs.tag }}
          keep_files: true
